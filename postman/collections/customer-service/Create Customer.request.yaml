$kind: http-request
method: POST
url: '{{baseUrl}}/api/v1/customer'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "firstname": "John",
      "lastname": "Doe",
      "email": "john.doe@example.com",
      "address": {
        "street": "Main Street",
        "houseNumber": "42",
        "zipCode": "10001"
      }
    }
